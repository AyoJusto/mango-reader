<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="fruit" x1="0.85" y1="0.05" x2="0.25" y2="0.95">
      <stop offset="0" stop-color="#FFC15E"/>
      <stop offset="0.55" stop-color="#FFAD33"/>
      <stop offset="1" stop-color="#F09609"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFB84D"/>
      <stop offset="1" stop-color="#E8890B"/>
    </linearGradient>
  </defs>

  <!-- plate -->
  <rect width="512" height="512" rx="114" fill="#1E2024"/>

  <!-- fruit: apex at the stem, broad top shoulder sweeping right, heavy low belly -->
  <path d="M 226 118
           C 150 108, 84 168, 72 262
           C 62 356, 116 442, 226 462
           C 340 482, 436 420, 446 316
           C 454 226, 420 150, 340 126
           C 306 116, 262 112, 226 118 Z" fill="url(#fruit)"/>

  <!-- bookmark cutout: flush through the shoulder, plate color punches the notch -->
  <path d="M 270 104 L 344 104 L 344 262 L 307 228 L 270 262 Z" fill="#1E2024"/>

  <!-- stem and leaf sit above the cutout: the bookmark emerges from under the leaf -->
  <path d="M 214 132 C 220 104, 230 80, 246 58 L 272 72 C 256 92, 246 114, 242 136 Z" fill="#E8890B"/>
  <path d="M 258 64 C 310 22, 398 34, 436 96 C 390 134, 302 122, 258 64 Z" fill="url(#leaf)"/>
</svg>
