<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="fruit" x1="0.9" y1="0.1" x2="0.15" y2="0.95">
      <stop offset="0" stop-color="#FFC868"/>
      <stop offset="0.5" stop-color="#FFAD33"/>
      <stop offset="1" stop-color="#EE8F06"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFB84D"/>
      <stop offset="1" stop-color="#E0820A"/>
    </linearGradient>
  </defs>

  <!-- stem: thick nub leaning up-right from the apex -->
  <path d="M 200 112 C 206 82, 220 52, 242 28 L 272 46 C 252 68, 238 96, 234 122 Z" fill="#E8890B"/>

  <!-- leaf: pointed both ends, sweeping right from the stem top -->
  <path d="M 264 44 C 330 -6, 434 10, 478 92 C 420 138, 312 122, 264 44 Z" fill="url(#leaf)"/>

  <!-- fruit: leaning teardrop — stem apex top-center, fat belly bottom-left, right side
       bulging at the shoulder then tapering in; the bookmark notch is part of the outline,
       so the cutout is true transparency -->
  <path d="M 218 100
           C 230 98, 241 98, 252 100
           L 252 252 L 293 218 L 334 252 L 334 116
           C 343 118, 351 121, 358 126
           C 404 158, 424 220, 410 292
           C 394 380, 344 474, 258 506
           C 216 520, 168 512, 130 478
           C 74 428, 48 340, 62 252
           C 74 172, 140 104, 218 100 Z" fill="url(#fruit)"/>
</svg>
